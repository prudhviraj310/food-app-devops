version: '3.8'

services:
  mysql:
    image: mysql:8
    container_name: food-app-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: Prudhviraj@310
      MYSQL_DATABASE: fooddb
    ports:
      - "3306:3306"
    volumes:
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  backend:
    build: ./backend
    container_name: food-app-backend
    restart: always
    ports:
      - "5000:5000"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_HOST: mysql
      DB_USER: root
      DB_PASSWORD: Prudhviraj@310
      DB_NAME: fooddb

  frontend:
    build: ./frontend
    container_name: food-app-frontend
    restart: always
    ports:
      - "3000:3000"  # Fixed port mapping to match your Dockerfile
    depends_on:
      - backend